<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>消失的园林</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #05080f;
  width: 100vw; height: 100vh; height: 100dvh;
  overflow: hidden;
  font-family: 'Noto Serif SC', serif;
  touch-action: none;
  overscroll-behavior: none;
  position: fixed;
}

#canvas { display: block; }

.title-block {
  position: fixed;
  top: max(28px, env(safe-area-inset-top, 28px));
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 100;
  pointer-events: none;
}
.title-main {
  font-size: clamp(15px, 3.5vw, 22px);
  font-weight: 300;
  letter-spacing: 8px;
  color: rgba(240,225,185,0.9);
  text-shadow: 0 0 30px rgba(200,160,80,0.4);
}
.title-sub {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 4px;
  color: rgba(200,160,80,0.4);
  margin-top: 5px;
  text-transform: uppercase;
}

/* ── Toolbar ── */
.toolbar {
  position: fixed;
  bottom: max(22px, env(safe-area-inset-bottom, 22px));
  left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 3px; align-items: center;
  background: rgba(8,12,22,0.86);
  border: 1px solid rgba(200,160,80,0.13);
  border-radius: 100px; padding: 4px 5px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  z-index: 150; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.tb-btn {
  background: none; border: 1px solid transparent;
  color: rgba(255,255,255,0.3); font-family: 'Noto Serif SC', serif;
  font-size: 11px; letter-spacing: 0.5px; padding: 6px 15px;
  border-radius: 100px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.tb-btn:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.05); }
.tb-btn.active {
  background: rgba(200,160,80,0.14);
  color: rgba(200,160,80,0.9);
  border-color: rgba(200,160,80,0.2);
}
.tb-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.08); margin: 0 1px; }

body.add-mode #canvas { cursor: crosshair; }
#addLabel {
  position: fixed;
  top: max(80px, calc(env(safe-area-inset-top, 0px) + 80px));
  left: 50%; transform: translateX(-50%);
  font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2.5px;
  color: rgba(200,160,80,0.52); pointer-events: none;
  opacity: 0; transition: opacity 0.3s; white-space: nowrap;
}
#addLabel.show { opacity: 1; }

/* ── Card ── */
.card {
  position: fixed;
  bottom: max(62px, calc(env(safe-area-inset-bottom, 0px) + 62px));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  width: min(380px, calc(100vw - 32px));
  background: rgba(8,12,22,0.93);
  border: 1px solid rgba(200,160,80,0.2);
  border-radius: 16px;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s cubic-bezier(0.16,1,0.3,1), transform 0.35s cubic-bezier(0.16,1,0.3,1);
  z-index: 200;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(200,160,80,0.06);
}
.card.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: all;
}

.card-img { width: 100%; height: 160px; object-fit: cover; display: block; }
.card-img-placeholder {
  width: 100%; height: 160px;
  background: linear-gradient(135deg, #0d1220, #111827);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  color: rgba(200,160,80,0.35);
  font-size: 11px; letter-spacing: 1.5px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  font-family: 'Cinzel', serif;
}
.card-img-placeholder:hover, .card-img-placeholder:active {
  background: linear-gradient(135deg, #111827, #1a2035);
  color: rgba(200,160,80,0.65);
}
.card-img-placeholder svg { opacity: 0.35; }

.card-body { padding: 16px 20px 20px; }

.card-edit-hint {
  position: absolute; bottom: 16px; right: 18px;
  font-family: 'Cinzel', serif; font-size: 7.5px; letter-spacing: 1.5px;
  color: rgba(200,160,80,0.2); pointer-events: none;
}

/* Editable fields */
.card-era {
  font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 3px;
  color: rgba(200,160,80,0.55);
  text-transform: uppercase; margin-bottom: 6px;
  outline: none; cursor: text;
  border-bottom: 1px dashed transparent; transition: border-color 0.2s;
  min-height: 14px; display: block;
}
.card-name {
  font-size: 22px; font-weight: 400;
  color: rgba(240,225,185,0.95);
  letter-spacing: 4px; margin-bottom: 4px;
  outline: none; cursor: text;
  border-bottom: 1px dashed transparent; transition: border-color 0.2s;
  min-height: 28px; display: block;
}
.card-location {
  font-size: 11px; color: rgba(255,255,255,0.28);
  letter-spacing: 1px; margin-bottom: 14px;
  font-family: 'Cinzel', serif;
  outline: none; cursor: text;
  border-bottom: 1px dashed transparent; transition: border-color 0.2s;
  min-height: 15px; display: block;
}
.card-divider {
  width: 32px; height: 1px;
  background: linear-gradient(90deg, rgba(200,160,80,0.45), transparent);
  margin-bottom: 13px;
}
.card-desc {
  font-size: 12px; line-height: 2;
  color: rgba(255,255,255,0.48); margin-bottom: 14px;
  outline: none; cursor: text;
  border-bottom: 1px dashed transparent; transition: border-color 0.2s;
  min-height: 20px; display: block;
}
.card-cause {
  display: inline-block; font-size: 10px; letter-spacing: 1px;
  padding: 4px 14px;
  border: 1px solid rgba(200,160,80,0.2);
  color: rgba(200,160,80,0.6);
  border-radius: 100px; font-family: 'Cinzel', serif;
  outline: none; cursor: text;
  transition: border-color 0.2s; min-width: 30px;
}
[contenteditable]:focus { border-bottom-color: rgba(200,160,80,0.4) !important; }
.card-cause:focus { border-color: rgba(200,160,80,0.5) !important; border-bottom-color: transparent !important; }
[contenteditable]:empty:before {
  content: attr(data-ph); color: rgba(255,255,255,0.18); pointer-events: none;
}

/* Footer row */
.card-footer {
  display: flex; align-items: center; gap: 10px;
  margin-top: 14px; flex-wrap: wrap;
}
.color-swatches { display: flex; gap: 6px; align-items: center; flex: 1; }
.cswatch {
  width: 12px; height: 12px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s;
}
.cswatch:hover { transform: scale(1.35); }
.cswatch.on { border-color: rgba(255,255,255,0.65); }
.card-delete {
  background: none; border: 1px solid rgba(255,70,70,0.18);
  border-radius: 100px; padding: 3px 12px;
  color: rgba(255,100,100,0.35); font-size: 9px; letter-spacing: 1px;
  cursor: pointer; font-family: 'Cinzel', serif; transition: all 0.2s; display: none;
}
.card-delete.show { display: inline-block; }
.card-delete:hover {
  background: rgba(255,50,50,0.07);
  color: rgba(255,120,120,0.75);
  border-color: rgba(255,70,70,0.38);
}

.card-close {
  position: absolute; top: 12px; right: 14px;
  background: rgba(0,0,0,0.45); border: none; border-radius: 50%;
  width: 28px; height: 28px;
  color: rgba(255,255,255,0.5);
  font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s; z-index: 10;
}
.card-close:hover { background: rgba(0,0,0,0.75); color: #fff; }

.card-change-btn {
  position: absolute; top: 130px; right: 12px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(200,160,80,0.3);
  border-radius: 100px; padding: 4px 12px;
  color: rgba(200,160,80,0.75); font-size: 10px;
  letter-spacing: 1px; cursor: pointer;
  font-family: 'Cinzel', serif;
  transition: all 0.2s; display: none;
  backdrop-filter: blur(8px);
}
.card-change-btn.show { display: block; }
.card-change-btn:hover { background: rgba(0,0,0,0.8); color: rgba(200,160,80,1); }

/* Save flash */
#saveFlash {
  position: fixed;
  top: max(72px, calc(env(safe-area-inset-top, 0px) + 72px));
  right: max(16px, env(safe-area-inset-right, 16px));
  font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px;
  color: rgba(200,160,80,0.42); pointer-events: none;
  opacity: 0; transition: opacity 0.4s;
}
#saveFlash.show { opacity: 1; }

/* Loading */
#loading {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #05080f; z-index: 999; transition: opacity 0.8s;
}
.ld-char {
  font-size: 22px; font-weight: 300; letter-spacing: 12px;
  color: rgba(200,160,80,0.5); margin-bottom: 24px;
  animation: ld-pulse 2s ease-in-out infinite;
}
@keyframes ld-pulse { 0%,100%{opacity:0.25} 50%{opacity:0.75} }
.ld-spinner {
  width: 26px; height: 26px;
  border: 1.5px solid rgba(200,160,80,0.12);
  border-top-color: rgba(200,160,80,0.6);
  border-radius: 50%; animation: spin 1s linear infinite;
  margin: 0 auto 12px;
}
.ld-text { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.18); font-family: 'Cinzel', serif; }
@keyframes spin { to { transform: rotate(360deg); } }

#zoomHint {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.18);
  pointer-events: none; opacity: 0; transition: opacity 0.5s;
  white-space: nowrap; font-family: 'Cinzel', serif;
}
#zoomHint.show { opacity: 1; }
#fileInput { display: none; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="title-block">
  <div class="title-main">消 失 的 园 林</div>
  <div class="title-sub">Lost Gardens of History</div>
</div>

<div class="toolbar">
  <button class="tb-btn active" id="btnExplore">🔍 探索</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btnAdd">＋ 添加图钉</button>
</div>
<div id="addLabel">点击地球表面放置新图钉</div>
<div id="saveFlash">已保存</div>

<div class="card" id="card">
  <button class="card-close" id="cardClose">✕</button>
  <div class="card-img-placeholder" id="cardPlaceholder">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    点击上传图片
  </div>
  <img id="cardImg" class="card-img" style="display:none" alt="">
  <button class="card-change-btn" id="cardChangeBtn">↑ 更换图片</button>
  <div class="card-body">
    <div class="card-era"      id="cardEra"      contenteditable="true" data-ph="朝代 · 年份"></div>
    <div class="card-name"     id="cardName"     contenteditable="true" data-ph="园林名称"></div>
    <div class="card-location" id="cardLocation" contenteditable="true" data-ph="所在地点"></div>
    <div class="card-divider"></div>
    <div class="card-desc"     id="cardDesc"     contenteditable="true" data-ph="描述这座园林…"></div>
    <span class="card-cause"   id="cardCause"   contenteditable="true" data-ph="消失原因"></span>
    <div class="card-footer">
      <div class="color-swatches" id="swatches"></div>
      <button class="card-delete" id="cardDelete">删除图钉</button>
    </div>
  </div>
  <div class="card-edit-hint">✎ 点击文字可编辑</div>
</div>

<div id="zoomHint">双指捏合缩放</div>
<input type="file" id="fileInput" accept="image/*">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════════════════
// PERSISTENCE
// ══════════════════════════════════════════════════════
const STORE_KEY = 'garden_globe_v4';
function loadStore() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e) { return {}; } }
function saveStore(o) { try { localStorage.setItem(STORE_KEY, JSON.stringify(o)); } catch(e) {} }

let store = loadStore();
if (!store.edits)  store.edits  = {};  // { [id]: {name,era,location,desc,cause,color,img} }
if (!store.custom) store.custom = [];  // [ {id,name,era,location,desc,cause,lat,lng,color,img} ]

let saveTimer;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    gardenPins.forEach(p => {
      if (!p.custom) {
        store.edits[p.id] = {
          name: p.garden.name, era: p.garden.era, location: p.garden.location,
          desc: p.garden.desc, cause: p.garden.cause, color: p.garden.color, img: p.img
        };
      }
    });
    store.custom = gardenPins.filter(p => p.custom).map(p => ({
      id: p.id, name: p.garden.name, era: p.garden.era,
      location: p.garden.location, desc: p.garden.desc, cause: p.garden.cause,
      lat: p.garden.lat, lng: p.garden.lng, color: p.garden.color, img: p.img
    }));
    saveStore(store);
    const sf = document.getElementById('saveFlash');
    sf.classList.add('show');
    clearTimeout(sf._t); sf._t = setTimeout(() => sf.classList.remove('show'), 1600);
  }, 500);
}

// ══════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════
const DEFAULT_GARDENS = [
  { id:'yuanmingyuan', name:'圆明园', era:'清代  ·  1709 — 1860', location:'Beijing, China · 北京',
    desc:'被誉为"万园之园"，集中国园林之大成，并融入欧洲风格的西洋楼景区，是清朝皇家园林艺术的最高杰作。',
    cause:'英法联军焚毁 · 1860', lat:40.00, lng:116.30, color:0xe8b84b },
  { id:'epanggong',    name:'阿房宫', era:'秦代  ·  前212年始建', location:"Xi'an, China · 陕西西安",
    desc:'秦始皇兴建的宏大皇家苑囿，因杜牧《阿房宫赋》而名传千古。考古研究表明其未能建成，随秦亡而荒废。',
    cause:'秦朝灭亡 · 工程未竟', lat:34.36, lng:108.90, color:0xd4944a },
  { id:'zhiyuan',      name:'止园',   era:'明代  ·  约1610年',    location:'Changzhou, China · 江苏常州',
    desc:'晚明江南名园，由造园家周廷策设计。因留有珍贵《止园图》，成为海内外学者数字复原研究的重要范本。',
    cause:'明清易代 · 毁于战乱', lat:31.78, lng:119.95, color:0x82c47a },
  { id:'zizhi',        name:'紫芝园', era:'明代  ·  约1509年',    location:'Suzhou, China · 江苏苏州',
    desc:'与拙政园同期建造，文徵明、仇英参与设计，代表吴门画派的造园美学巅峰，存世不足百年即付一炬。',
    cause:'明末清初 · 毁于大火', lat:31.32, lng:120.62, color:0xb088d4 },
  { id:'shanglin',     name:'上林苑', era:'西汉  ·  前138年',     location:'Guanzhong, China · 陕西关中',
    desc:'中国古代规模最大的皇家园林，广袤数百里，涵盖山川与狩猎区，是汉武帝时代国力鼎盛的象征。',
    cause:'汉朝灭亡 · 逐渐荒废', lat:34.10, lng:108.40, color:0x5ab4d8 },
];

function getGardens() {
  return DEFAULT_GARDENS.map(d => {
    const s = store.edits[d.id];
    return s ? { ...d, ...s } : { ...d };
  });
}

const COLORS = [0xe8b84b, 0xd4944a, 0x82c47a, 0xb088d4, 0x5ab4d8, 0xff8585, 0x7ad4ff, 0xffffff];

function latLngToVec3(lat, lng, r) {
  const phi   = (90 - lat)  * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}
function hexToRgb(hex) { return `${(hex>>16)&255},${(hex>>8)&255},${hex&255}`; }

// ══════════════════════════════════════════════════════
// SCENE  (identical to original)
// ══════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 2.8;

const isMobile = window.innerWidth < 768;

const starPos = new Float32Array((isMobile ? 800 : 1800) * 3);
for (let i = 0; i < starPos.length; i++) starPos[i] = (Math.random() - 0.5) * 200;
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: isMobile ? 0.18 : 0.11, transparent: true, opacity: 0.5 })));

const loadingEl = document.createElement('div');
loadingEl.id = 'loading';
loadingEl.innerHTML = `<div style="text-align:center"><div class="ld-char">消失的园林</div><div class="ld-spinner"></div><div class="ld-text">LOADING MAPS</div></div>`;
document.body.appendChild(loadingEl);

const RADIUS  = 1;
const globeGeo = new THREE.SphereGeometry(RADIUS, isMobile ? 48 : 64, isMobile ? 48 : 64);
const loader   = new THREE.TextureLoader();
const pinGroup = new THREE.Group();
scene.add(pinGroup);

let earthMesh, cloudMesh;

// Lights declared first so they're always in scene
const sun = new THREE.DirectionalLight(0xfff5e0, 1.6);
sun.position.set(5, 3, 5); scene.add(sun);
scene.add(new THREE.AmbientLight(0x1a2a4a, 0.8));
const fill = new THREE.DirectionalLight(0x334466, 0.3);
fill.position.set(-3, -2, -3); scene.add(fill);

Promise.all([
  new Promise(r => loader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/2_no_clouds_4k.jpg', t => r(t), null, () => r(null))),
  new Promise(r => loader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/water_4k.png',       t => r(t), null, () => r(null))),
  new Promise(r => loader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/elev_bump_4k.jpg',   t => r(t), null, () => r(null))),
  new Promise(r => loader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/fair_clouds_4k.png', t => r(t), null, () => r(null))),
]).then(([day, spec, bump, cloud]) => {
  loadingEl.style.opacity = '0';
  setTimeout(() => loadingEl.remove(), 700);

  earthMesh = new THREE.Mesh(globeGeo, new THREE.MeshPhongMaterial({
    map: day, specularMap: spec, specular: new THREE.Color(0x4488bb),
    shininess: 22, bumpMap: bump, bumpScale: 0.008,
  }));
  scene.add(earthMesh);

  if (cloud) {
    cloudMesh = new THREE.Mesh(
      new THREE.SphereGeometry(RADIUS + 0.012, 48, 48),
      new THREE.MeshPhongMaterial({ map: cloud, alphaMap: cloud, transparent: true, opacity: 0.75, depthWrite: false })
    );
    scene.add(cloudMesh);
  }

  scene.add(new THREE.Mesh(new THREE.SphereGeometry(RADIUS + 0.06, 48, 48),
    new THREE.MeshPhongMaterial({ color: 0x3a8fff, transparent: true, opacity: 0.07, side: THREE.FrontSide, depthWrite: false })));
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(RADIUS + 0.16, 48, 48),
    new THREE.MeshPhongMaterial({ color: 0x1a66ff, transparent: true, opacity: 0.04, side: THREE.BackSide, depthWrite: false })));

  // Build pins with saved edits merged
  getGardens().forEach(g => buildPin(g, false));
  store.custom.forEach(g => buildPin(g, true));

  startLoop();
});

// ══════════════════════════════════════════════════════
// PINS  — smaller & more precise
// ══════════════════════════════════════════════════════
const gardenPins = [];

function buildPin(garden, custom) {
  const pos = latLngToVec3(garden.lat, garden.lng, RADIUS + 0.018);
  const g = new THREE.Group();

  // Dot: r=0.012 (was 0.020) — smaller, sharper
  g.add(new THREE.Mesh(
    new THREE.SphereGeometry(0.012, 12, 12),
    new THREE.MeshPhongMaterial({ color: garden.color, emissive: garden.color, emissiveIntensity: 1.0 })
  ));
  // Ring: r=0.024 (was 0.036) — thinner pulse ring
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.024, 0.0025, 6, 24),
    new THREE.MeshPhongMaterial({ color: garden.color, transparent: true, opacity: 0.5 })
  );
  g.add(ring);

  g.position.copy(pos);
  g.lookAt(pos.clone().multiplyScalar(2));
  pinGroup.add(g);

  const pin = {
    id: garden.id || ('c_' + Date.now() + '_' + Math.random().toString(36).slice(2,6)),
    garden: {
      name: garden.name, era: garden.era, location: garden.location,
      desc: garden.desc, cause: garden.cause,
      lat: garden.lat, lng: garden.lng, color: garden.color,
    },
    mesh: g,
    img: garden.img || null,
    custom: !!custom,
  };
  gardenPins.push(pin);
  return pin;
}

// ══════════════════════════════════════════════════════
// COLOR SWATCHES
// ══════════════════════════════════════════════════════
let selectedColor = COLORS[0];
const swatchCont = document.getElementById('swatches');

COLORS.forEach(c => {
  const sw = document.createElement('div');
  sw.className = 'cswatch';
  sw.style.background = '#' + c.toString(16).padStart(6,'0');
  sw.dataset.c = c;
  sw.addEventListener('click', () => {
    selectedColor = c;
    swatchCont.querySelectorAll('.cswatch').forEach(s => s.classList.toggle('on', +s.dataset.c === c));
    if (activePin) {
      activePin.garden.color = c;
      activePin.mesh.children[0].material.color.set(c);
      activePin.mesh.children[0].material.emissive.set(c);
      activePin.mesh.children[1].material.color.set(c);
      card.style.borderColor = `rgba(${hexToRgb(c)},0.25)`;
      scheduleSave();
    }
  });
  swatchCont.appendChild(sw);
});

function syncSwatches(color) {
  selectedColor = color;
  swatchCont.querySelectorAll('.cswatch').forEach(s => s.classList.toggle('on', +s.dataset.c === color));
}

// ══════════════════════════════════════════════════════
// CARD + EDITABLE FIELDS
// ══════════════════════════════════════════════════════
const card           = document.getElementById('card');
const cardClose      = document.getElementById('cardClose');
const cardImg        = document.getElementById('cardImg');
const cardPlaceholder= document.getElementById('cardPlaceholder');
const cardChangeBtn  = document.getElementById('cardChangeBtn');
const cardDeleteBtn  = document.getElementById('cardDelete');
const fileInput      = document.getElementById('fileInput');
let activePin = null;

const FIELDS = { cardEra:'era', cardName:'name', cardLocation:'location', cardDesc:'desc', cardCause:'cause' };
Object.entries(FIELDS).forEach(([elId, key]) => {
  const el = document.getElementById(elId);
  el.addEventListener('input', () => {
    if (!activePin) return;
    activePin.garden[key] = el.textContent.trim();
    scheduleSave();
  });
  if (elId !== 'cardDesc') {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); }});
  }
});

function openCard(pin) {
  activePin = pin;
  const g = pin.garden;
  document.getElementById('cardEra').textContent      = g.era      || '';
  document.getElementById('cardName').textContent     = g.name     || '';
  document.getElementById('cardLocation').textContent = g.location || '';
  document.getElementById('cardDesc').textContent     = g.desc     || '';
  document.getElementById('cardCause').textContent    = g.cause    || '';
  card.style.borderColor = `rgba(${hexToRgb(g.color)},0.25)`;
  syncSwatches(g.color);

  if (pin.img) {
    cardImg.src = pin.img; cardImg.style.display = 'block';
    cardPlaceholder.style.display = 'none'; cardChangeBtn.classList.add('show');
  } else {
    cardImg.style.display = 'none';
    cardPlaceholder.style.display = 'flex'; cardChangeBtn.classList.remove('show');
  }
  cardDeleteBtn.classList.toggle('show', !!pin.custom);
  card.classList.add('visible');
}

cardClose.addEventListener('click', () => card.classList.remove('visible'));
cardPlaceholder.addEventListener('click', () => fileInput.click());
cardChangeBtn.addEventListener('click',   () => fileInput.click());

cardDeleteBtn.addEventListener('click', () => {
  if (!activePin?.custom) return;
  if (!confirm('删除这个图钉？')) return;
  pinGroup.remove(activePin.mesh);
  gardenPins.splice(gardenPins.indexOf(activePin), 1);
  card.classList.remove('visible');
  activePin = null;
  scheduleSave();
});

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file || !activePin) return;
  const reader = new FileReader();
  reader.onload = ev => {
    activePin.img = ev.target.result;
    cardImg.src = ev.target.result; cardImg.style.display = 'block';
    cardPlaceholder.style.display = 'none'; cardChangeBtn.classList.add('show');
    scheduleSave();
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
});

// ══════════════════════════════════════════════════════
// MODE TOGGLE
// ══════════════════════════════════════════════════════
let addMode = false;
const btnExplore = document.getElementById('btnExplore');
const btnAdd     = document.getElementById('btnAdd');
const addLabel   = document.getElementById('addLabel');

function setMode(m) {
  addMode = m === 'add';
  btnExplore.classList.toggle('active', !addMode);
  btnAdd.classList.toggle('active',      addMode);
  document.body.classList.toggle('add-mode', addMode);
  addLabel.classList.toggle('show', addMode);
  if (addMode) card.classList.remove('visible');
}
btnExplore.addEventListener('click', () => setMode('explore'));
btnAdd.addEventListener('click',     () => setMode('add'));

// ══════════════════════════════════════════════════════
// PLACE PIN  — raycaster hit accounting for globe rotation
// ══════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();

function placePin(clientX, clientY) {
  if (!earthMesh) return;
  const ndc = new THREE.Vector2(
     (clientX / window.innerWidth)  * 2 - 1,
    -(clientY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObject(earthMesh);
  if (!hits.length) return;

  // Un-rotate hit point to get stable lat/lng
  const local = earthMesh.worldToLocal(hits[0].point.clone()).normalize();
  const lat = 90 - Math.acos(Math.max(-1, Math.min(1, local.y))) * 180 / Math.PI;
  let lng = Math.atan2(local.z, -local.x) * 180 / Math.PI - 180;
  lng = ((lng % 360) + 540) % 360 - 180;

  const newG = {
    id: 'c_' + Date.now(),
    name: '新图钉', era: '朝代 · 年份', location: '地点',
    desc: '点击此处编辑描述…', cause: '消失原因',
    lat, lng, color: selectedColor,
  };
  const pin = buildPin(newG, true);
  openCard(pin);
  scheduleSave();
  setMode('explore');
}

// ══════════════════════════════════════════════════════
// CONTROLS  (same as original + addMode branch)
// ══════════════════════════════════════════════════════
let isDragging = false, prevX = 0, prevY = 0, dragDist = 0;
let rotVelX = 0, rotVelY = 0;
let pinchDist0 = 0, camZ0 = camera.position.z;
const CAM_MIN = 1.4, CAM_MAX = 5.0;

function applyDelta(dx, dy) {
  rotVelY = dx * 0.005; rotVelX = dy * 0.005;
  if (earthMesh) { earthMesh.rotation.y += rotVelY; earthMesh.rotation.x += rotVelX; }
  if (cloudMesh) { cloudMesh.rotation.y += rotVelY * 1.05; cloudMesh.rotation.x += rotVelX; }
  pinGroup.rotation.y += rotVelY; pinGroup.rotation.x += rotVelX;
}

function nearestPin(cx, cy, thresh) {
  let best = null, bestD = Infinity;
  gardenPins.forEach(pin => {
    const wp = pin.mesh.getWorldPosition(new THREE.Vector3());
    const sp = wp.clone().project(camera);
    const sx = (sp.x + 1) / 2 * window.innerWidth;
    const sy = (1 - sp.y) / 2 * window.innerHeight;
    const d  = Math.hypot(cx - sx, cy - sy);
    const facing = wp.clone().normalize().dot(new THREE.Vector3(0,0,1).applyQuaternion(camera.quaternion));
    if (d < thresh && d < bestD && facing > 0.05) { bestD = d; best = pin; }
  });
  return best;
}

// Mouse
canvas.addEventListener('mousedown', e => {
  isDragging = true; dragDist = 0;
  prevX = e.clientX; prevY = e.clientY; rotVelX = 0; rotVelY = 0;
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevX, dy = e.clientY - prevY;
  dragDist += Math.hypot(dx, dy);
  applyDelta(dx, dy);
  prevX = e.clientX; prevY = e.clientY;
});
window.addEventListener('mouseup', e => {
  isDragging = false;
  if (dragDist < 5) {
    if (addMode) { placePin(e.clientX, e.clientY); }
    else {
      const pin = nearestPin(e.clientX, e.clientY, 36);
      if (pin) openCard(pin);
    }
  }
  dragDist = 0;
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camera.position.z = Math.max(CAM_MIN, Math.min(CAM_MAX, camera.position.z + e.deltaY * 0.004));
}, { passive: false });

// Touch
let tapStart = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); rotVelX = 0; rotVelY = 0; dragDist = 0;
  if (e.touches.length === 1) {
    isDragging = true;
    prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
    tapStart = { x: prevX, y: prevY, t: Date.now() };
  } else if (e.touches.length === 2) {
    isDragging = false;
    pinchDist0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    camZ0 = camera.position.z;
    const zh = document.getElementById('zoomHint');
    zh.classList.add('show'); clearTimeout(zh._t); zh._t = setTimeout(() => zh.classList.remove('show'), 1500);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
    const dx = tx - prevX, dy = ty - prevY;
    dragDist += Math.hypot(dx, dy);
    applyDelta(dx, dy);
    prevX = tx; prevY = ty;
    if (tapStart && dragDist > 8) tapStart = null;
  } else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    camera.position.z = Math.max(CAM_MIN, Math.min(CAM_MAX, camZ0 * (pinchDist0 / d)));
    tapStart = null;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault(); isDragging = false;
  if (tapStart && e.changedTouches.length === 1) {
    const t = e.changedTouches[0];
    if (Math.hypot(t.clientX - tapStart.x, t.clientY - tapStart.y) < 10 && Date.now() - tapStart.t < 400) {
      if (addMode) { placePin(t.clientX, t.clientY); }
      else {
        const pin = nearestPin(t.clientX, t.clientY, 48);
        if (pin) openCard(pin); else card.classList.remove('visible');
      }
    }
  }
  tapStart = null;
}, { passive: false });

// Resize
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', () => setTimeout(onResize, 200));

// ══════════════════════════════════════════════════════
// RENDER LOOP  (identical to original)
// ══════════════════════════════════════════════════════
let frame = 0;
function startLoop() {
  (function loop() {
    requestAnimationFrame(loop); frame++;
    if (!isDragging) {
      rotVelX *= 0.92; rotVelY *= 0.92;
      if (earthMesh) { earthMesh.rotation.y += rotVelY; earthMesh.rotation.x += rotVelX; }
      if (cloudMesh) { cloudMesh.rotation.y += rotVelY * 1.05; cloudMesh.rotation.x += rotVelX; }
      pinGroup.rotation.y += rotVelY; pinGroup.rotation.x += rotVelX;
    }
    if (cloudMesh) cloudMesh.rotation.y += 0.00012;
    gardenPins.forEach((p, i) => {
      const ring = p.mesh.children[1];
      if (ring) {
        const s = 1 + 0.38 * Math.sin(frame * 0.042 + i * 1.3);
        ring.scale.setScalar(s);
        ring.material.opacity = 0.2 + 0.3 * Math.sin(frame * 0.042 + i * 1.3);
      }
    });
    renderer.render(scene, camera);
  })();
}
(function preLoop() {
  if (earthMesh) return;
  requestAnimationFrame(preLoop);
  renderer.render(scene, camera);
})();
</script>
</body>
